name: "CodeQL J2ME"

on:
  push:
    branches: [ main ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: github/codeql-action/init@v3
      with:
        languages: java
        queries: +security-and-quality
        # Configurar classpath J2ME
        setup: |
          wget https://repo1.maven.org/maven2/net/sf/j2me/me4se/me4se/1.3.3/me4se-1.3.3.jar
    - uses: github/codeql-action/analyze@v3
